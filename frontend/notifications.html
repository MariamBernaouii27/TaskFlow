<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #0d0d1a; color: #e0e0ff; font-family: 'Segoe UI', sans-serif; }

    .navbar-brand span { color: #7c6aff; }
    .bell-wrap { position: relative; display: inline-block; }
    #notif-badge {
      position: absolute; top: -6px; right: -6px;
      background: #ff6a9b; color: #fff;
      border-radius: 999px; min-width: 18px; height: 18px;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px; border: 2px solid #0d0d1a;
      animation: pulse 2s infinite;
    }
    #notif-badge.d-none { display: none !important; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    #notif-panel {
      position: absolute; top: 52px; right: 0;
      width: 320px; background: #13132a;
      border: 1px solid #2a2a4a; border-radius: 14px;
      box-shadow: 0 20px 60px #00000088;
      z-index: 999; display: none;
      animation: slideDown 0.2s ease;
    }
    #notif-panel.show { display: block; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    .panel-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid #2a2a4a;
    }
    .panel-scroll { max-height: 300px; overflow-y: auto; }
    .panel-item {
      display: flex; gap: 10px; padding: 12px 16px;
      border-bottom: 1px solid #111120; transition: background 0.2s;
    }
    .panel-item:hover { background: #1a1a35; }
    .p-dot { width:8px; height:8px; border-radius:50%; background:#7c6aff; margin-top:5px; flex-shrink:0; }
    .p-dot.read { background: #2a2a4a; }
    .p-msg { font-size: 12px; color: #c0c0e0; line-height: 1.5; }
    .p-time { font-size: 10px; color: #5a5a7a; font-family: monospace; }
    .card { background: #13132a; border: 1px solid #2a2a4a; border-radius: 14px; }
    .card-header { background: #1a1a35; border-bottom: 1px solid #2a2a4a; border-radius: 14px 14px 0 0 !important; }
    .notif-card {
      display: flex; gap: 14px; padding: 16px;
      border-radius: 12px; margin-bottom: 10px;
      border: 1px solid #2a2a4a; background: #13132a;
      transition: all 0.2s; animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .notif-card.unread { background: #16163a; border-color: #3a3a60; }
    .notif-card:hover { transform: translateX(4px); }

    .notif-dot { width:9px; height:9px; border-radius:50%; background:#7c6aff; margin-top:6px; flex-shrink:0; box-shadow:0 0 8px #7c6aff; }
    .notif-dot.read { background:#2a2a4a; box-shadow:none; }

    .notif-msg { font-size: 14px; color: #c7c7f0; line-height: 1.6; margin-bottom: 4px; }
    .notif-card.read .notif-msg { color: #5a5a7a; }
    .notif-time { font-size: 11px; color: #5a5a7a; font-family: monospace; }
    .btn-read {
      background: #1a1a35; border: 1px solid #2a2a4a;
      border-radius: 8px; color: #7c6aff; font-size: 12px;
      cursor: pointer; padding: 5px 12px; align-self: center;
      white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-read:hover { background: #7c6aff; color: #fff; border-color: #7c6aff; }
    .poll-bar {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a35; border: 1px solid #2a2a4a;
      border-radius: 10px; padding: 10px 16px;
      font-size: 12px; color: #5a5a7a; font-family: monospace;
    }
    .poll-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:pulse 2s infinite; }
    .archived-card {
      display: flex; gap: 12px; padding: 12px 16px;
      border-radius: 10px; border: 1px solid #1e1e36;
      background: #0f0f20; margin-bottom: 8px;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }
    .btn-accent { background: #7c6aff; border: none; color: #fff; border-radius: 8px; font-size: 12px; padding: 6px 14px; }
    .btn-accent:hover { background: #6a58ee; color: #fff; }
    .btn-outline-accent { background: none; border: 1px solid #2a2a4a; color: #7c6aff; border-radius: 8px; font-size: 12px; padding: 6px 14px; }
    .btn-outline-accent:hover { border-color: #7c6aff; background: #7c6aff22; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3 mb-4" style="background:#0a0a18; border-bottom:1px solid #2a2a4a; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px);">
    <a class="navbar-brand fw-bold" href="#">
      <i class="fa-solid fa-diagram-project me-2" style="color:#7c6aff"></i>Task<span>Flow</span>
    </a>

    <div class="d-flex align-items-center gap-3">
      <div class="d-none d-md-flex align-items-center gap-2" style="font-size:11px; color:#5a5a7a; font-family:monospace;">
        <div class="poll-dot"></div>
        <span id="nav-poll">Polling actif</span>
      </div>
      <div class="bell-wrap">
        <button class="btn btn-sm" style="background:#1a1a35; border:1px solid #2a2a4a; color:#e0e0ff; width:40px; height:40px;" onclick="togglePanel()">
          <i class="fa-solid fa-bell"></i>
        </button>
        <span id="notif-badge" class="d-none">0</span>
        <div id="notif-panel">
          <div class="panel-header">
            <span style="font-size:14px; font-weight:700;">Notifications</span>
            <button class="btn-outline-accent" onclick="markAllAsRead()">
              <i class="fa-solid fa-check-double me-1"></i>Tout lu
            </button>
          </div>
          <div class="panel-scroll" id="panel-list">
            <div class="text-center py-4" style="color:#5a5a7a; font-size:13px;">Chargement...</div>
          </div>
          <div class="p-2 text-center" style="border-top:1px solid #2a2a4a;">
            <a href="#notif-list" style="font-size:12px; color:#7c6aff; text-decoration:none;">
              Voir toutes les notifications
            </a>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <div class="container pb-5" style="max-width:700px;">
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
      <div>
        <h2 class="fw-bold mb-1">
          <i class="fa-solid fa-bell me-2" style="color:#7c6aff"></i>Notifications
        </h2>
        <p id="unread-label" style="color:#5a5a7a; font-size:13px; font-family:monospace;">— non lues</p>
      </div>
      <button class="btn-outline-accent" onclick="markAllAsRead()">
        <i class="fa-solid fa-check-double me-1"></i>Tout marquer lu
      </button>
    </div>
    <div class="poll-bar mb-4">
      <div class="poll-dot"></div>
      <span id="poll-status">Polling actif — vérification toutes les 30 secondes</span>
    </div>
    <div id="notif-list">
      <div class="text-center py-5">
        <div class="spinner-border mb-3" style="color:#7c6aff;" role="status"></div>
        <p style="color:#5a5a7a; font-size:13px;">Chargement...</p>
      </div>
    </div>
    <div class="mt-4 pt-4" style="border-top:1px solid #2a2a4a;">
      <p style="color:#5a5a7a; font-size:12px; font-family:monospace; margin-bottom:14px;">
        <i class="fa-solid fa-box-archive me-2" style="color:#7c6aff"></i>
        Notifications archivées (localStorage)
        <span id="archived-count" class="ms-2" style="color:#7c6aff; font-weight:700;">0</span>
      </p>
      <div id="archived-list"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const LS_KEY = 'taskflow_notifications_read';
    let notifications = [];
    let pollTimer = null;
    function getArchived() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
      catch { return []; }
    }

    function archiveNotif(n) {
      const arr = getArchived();
      if (!arr.find(a => a._id === n._id)) {
        arr.unshift({ ...n, archivedAt: new Date().toISOString() });
        if (arr.length > 100) arr.pop();
        localStorage.setItem(LS_KEY, JSON.stringify(arr));
      }
      renderArchived();
    }
    function timeAgo(d) {
      const s = Math.floor((Date.now() - new Date(d)) / 1000);
      if (s < 60) return "à l'instant";
      if (s < 3600) return `il y a ${Math.floor(s/60)} min`;
      if (s < 86400) return `il y a ${Math.floor(s/3600)} h`;
      return `il y a ${Math.floor(s/86400)} j`;
    }
    function updateBadge(count) {
      const badge = document.getElementById('notif-badge');
      document.getElementById('unread-label').textContent = `${count} non lue${count!==1?'s':''}`;
      document.getElementById('nav-poll').textContent = `Polling · ${new Date().toLocaleTimeString()}`;
      if (count > 0) {
        badge.textContent = count > 99 ? '99+' : count;
        badge.classList.remove('d-none');
      } else {
        badge.classList.add('d-none');
      }
    }
    function renderNotifs() {
      const list = document.getElementById('notif-list');
      if (!notifications.length) {
        list.innerHTML = `<div class="text-center py-5" style="color:#5a5a7a">
          <i class="fa-solid fa-inbox fa-2x mb-3 d-block"></i>Aucune notification</div>`;
        return;
      }
      list.innerHTML = notifications.map((n, i) => `
        <div class="notif-card ${n.read?'read':'unread'}" style="animation-delay:${i*0.05}s">
          <div class="notif-dot ${n.read?'read':''}"></div>
          <div class="flex-grow-1">
            <p class="notif-msg">${n.message}</p>
            <span class="notif-time"><i class="fa-regular fa-clock me-1"></i>${timeAgo(n.createdAt)}</span>
          </div>
          ${!n.read ? `<button class="btn-read" onclick="markAsRead('${n._id}')">
            <i class="fa-solid fa-check me-1"></i>Lu
          </button>` : ''}
        </div>`).join('');
    }
    function renderPanel() {
      const el = document.getElementById('panel-list');
      const items = notifications.slice(0, 5);
      if (!items.length) {
        el.innerHTML = `<div class="text-center py-4" style="color:#5a5a7a;font-size:13px">Aucune notification</div>`;
        return;
      }
      el.innerHTML = items.map(n => `
        <div class="panel-item">
          <div class="p-dot ${n.read?'read':''}"></div>
          <div class="flex-grow-1">
            <p class="p-msg">${n.message}</p>
            <span class="p-time">${timeAgo(n.createdAt)}</span>
          </div>
          ${!n.read ? `<button class="btn-read" style="font-size:11px;padding:3px 8px" onclick="markAsRead('${n._id}')">✓</button>` : ''}
        </div>`).join('');
    }
    function renderArchived() {
      const archived = getArchived();
      document.getElementById('archived-count').textContent = archived.length;
      const list = document.getElementById('archived-list');
      if (!archived.length) {
        list.innerHTML = `<p style="color:#5a5a7a;font-size:12px;font-family:monospace">Aucune notification archivée</p>`;
        return;
      }
      list.innerHTML = archived.slice(0, 5).map(n => `
        <div class="archived-card">
          <div class="notif-dot read" style="margin-top:5px"></div>
          <div>
            <p class="notif-msg" style="color:#5a5a7a;font-size:13px">${n.message}</p>
            <span class="notif-time"><i class="fa-solid fa-box-archive me-1"></i>Lu ${timeAgo(n.archivedAt)}</span>
          </div>
        </div>`).join('');
    }
    async function fetchNotifications() {
      const token = localStorage.getItem('token');
      if (!token) return;
      try {
        const res = await axios.get('http://localhost:3000/api/notifications', {
          headers: { Authorization: `Bearer ${token}` }
        });
        notifications = res.data.data;
        updateBadge(res.data.unreadCount);
        renderNotifs();
        renderPanel();
        document.getElementById('poll-status').textContent =
          `Polling actif — dernière mise à jour à ${new Date().toLocaleTimeString()}`;
      } catch(err) {
        console.error('[Notifications]', err.message);
      }
    }
    async function markAsRead(id) {
      const token = localStorage.getItem('token');
      try {
        const res = await axios.patch(
          `http://localhost:3000/api/notifications/${id}/read`, {},
          { headers: { Authorization: `Bearer ${token}` } }
        );
        archiveNotif(res.data.notification);
        notifications = notifications.map(n => n._id===id ? {...n, read:true} : n);
        updateBadge(res.data.unreadCount);
        renderNotifs();
        renderPanel();
      } catch(err) { console.error('[markAsRead]', err.message); }
    }
    async function markAllAsRead() {
      const token = localStorage.getItem('token');
      try {
        await axios.patch('http://localhost:3000/api/notifications/read-all', {},
          { headers: { Authorization: `Bearer ${token}` } });
        notifications.filter(n=>!n.read).forEach(archiveNotif);
        notifications = notifications.map(n=>({...n, read:true}));
        updateBadge(0);
        renderNotifs();
        renderPanel();
      } catch(err) { console.error('[markAll]', err.message); }
    }
    function togglePanel() {
      document.getElementById('notif-panel').classList.toggle('show');
    }
    document.addEventListener('click', e => {
      if (!document.querySelector('.bell-wrap').contains(e.target))
        document.getElementById('notif-panel').classList.remove('show');
    });
    renderArchived();
    fetchNotifications();
    pollTimer = setInterval(fetchNotifications, 30000);
  </script>
</body>
</html>
