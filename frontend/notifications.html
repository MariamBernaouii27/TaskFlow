<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Notifications</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a14; color: #e0e0ff; padding: 24px; }
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h1 { font-size: 20px; }
    .bell-wrap { position: relative; display: inline-block; }
    #notif-badge {
      position: absolute; top: -6px; right: -6px;
      background: red; color: white; border-radius: 50%;
      width: 18px; height: 18px; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
    }
    #notif-badge.hidden { display: none; }
    button { background: none; border: none; font-size: 24px; cursor: pointer; }
    .notif-item {
      display: flex; gap: 12px; padding: 14px;
      border-radius: 10px; margin-bottom: 8px;
      background: #1a1a30; border: 1px solid #2e2e50;
    }
    .notif-item.read { background: #0f0f1e; border-color: #1e1e36; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #818cf8; margin-top: 5px; flex-shrink: 0; }
    .dot.read { background: #2a2a4a; }
    .msg { color: #c7c7f0; font-size: 14px; margin-bottom: 4px; }
    .time { color: #4a4a70; font-size: 12px; }
    .read-btn {
      background: #1e1e38; border: 1px solid #3a3a60;
      border-radius: 8px; color: #818cf8; font-size: 12px;
      cursor: pointer; padding: 4px 12px;
    }
  </style>
</head>
<body>

  <nav>
    <h1>TaskFlow</h1>
    <div class="bell-wrap">
      <button onclick="togglePanel()">🔔</button>
      <span id="notif-badge" class="hidden">0</span>
    </div>
  </nav>

  <h2 style="margin-bottom:16px">🔔 Notifications</h2>
  <div id="notif-list">Chargement...</div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const LS_KEY = "taskflow_notifications_read";
    let notifications = [];

    function timeAgo(date) {
      const diff = Math.floor((Date.now() - new Date(date)) / 1000);
      if (diff < 60) return "à l'instant";
      if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `il y a ${Math.floor(diff / 3600)} h`;
      return `il y a ${Math.floor(diff / 86400)} j`;
    }

    function updateBadge(count) {
      const badge = document.getElementById("notif-badge");
      if (count > 0) {
        badge.textContent = count > 99 ? "99+" : count;
        badge.classList.remove("hidden");
      } else {
        badge.classList.add("hidden");
      }
    }

    function renderNotifs() {
      document.getElementById("notif-list").innerHTML =
        notifications.map(n => `
          <div class="notif-item ${n.read ? 'read' : ''}">
            <div class="dot ${n.read ? 'read' : ''}"></div>
            <div style="flex:1">
              <p class="msg">${n.message}</p>
              <span class="time">${timeAgo(n.createdAt)}</span>
            </div>
            ${!n.read ? `<button class="read-btn" onclick="markAsRead('${n._id}')">✓ Lu</button>` : ""}
          </div>
        `).join("") || "<p style='color:#4a4a70'>Aucune notification</p>";
    }

    async function fetchNotifications() {
      const token = localStorage.getItem("token");
      if (!token) return;
      try {
        const res = await axios.get("http://localhost:3000/api/notifications", {
          headers: { Authorization: `Bearer ${token}` }
        });
        notifications = res.data.data;
        updateBadge(res.data.unreadCount);
        renderNotifs();
      } catch (err) {
        console.error("Erreur fetch notifications", err.message);
      }
    }
