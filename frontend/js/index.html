<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5;
           display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: #fff; padding: 2rem; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 360px; }
    h1 { text-align: center; margin-bottom: 1.5rem; color: #16213e; }
    input { width: 100%; padding: .65rem .8rem; margin-bottom: .9rem;
            border: 1px solid #ccc; border-radius: 6px; font-size: .95rem; }
    button { width: 100%; padding: .7rem; background: #0f3460;
             color: #fff; border: none; border-radius: 6px;
             cursor: pointer; font-size: 1rem; }
    button:hover { background: #16213e; }
    .toggle { text-align: center; margin-top: 1rem; font-size: .87rem;
              cursor: pointer; color: #0f3460; text-decoration: underline; }
    .error { color: red; font-size: .85rem; margin-bottom: .8rem; display: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>TaskFlow</h1>
  <div id="errorMsg" class="error"></div>
  <!-- Formulaire connexion -->
  <div id="loginForm">
    <input type="email"    id="loginEmail"    placeholder="Email" />
    <input type="password" id="loginPassword" placeholder="Mot de passe" />
    <button onclick="login()">Se connecter</button>
    <p class="toggle" onclick="toggleForm()">Pas de compte ? S'inscrire</p>
  </div>
  <!-- Formulaire inscription -->
  <div id="registerForm" style="display:none">
    <input type="text"     id="regName"     placeholder="Nom complet" />
    <input type="email"    id="regEmail"    placeholder="Email" />
    <input type="password" id="regPassword" placeholder="Mot de passe (8 car. min)" />
    <button onclick="register()">Créer un compte</button>
    <p class="toggle" onclick="toggleForm()">Déjà un compte ? Se connecter</p>
  </div>
</div>
<script>
  const API = 'http://localhost:5000/api';
  // Restauration de session au rechargement
  if (localStorage.getItem('token')) location.href = 'dashboard.html';
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function toggleForm() {
    const lf = document.getElementById('loginForm');
    const rf = document.getElementById('registerForm');
    lf.style.display = lf.style.display === 'none' ? 'block' : 'none';
    rf.style.display = rf.style.display === 'none' ? 'block' : 'none';
    document.getElementById('errorMsg').style.display = 'none';
  }
  async function login() {
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
      const res  = await fetch(`${API}/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showError(data.message);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user',  JSON.stringify(data.user));
      location.href = 'dashboard.html';
    } catch { showError('Erreur réseau'); }
  }
  async function register() {
    const fullName = document.getElementById('regName').value;
    const email    = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    try {
      const res  = await fetch(`${API}/auth/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ fullName, email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showError(data.message || data.errors?.[0]?.msg);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user',  JSON.stringify(data.user));
      location.href = 'dashboard.html';
    } catch { showError('Erreur réseau'); }
  }
</script>
</body>
</html>
