<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="auth-wrapper">
  <div class="container">
    <div class="auth-card mx-auto">
      <div class="card p-4">
        <div class="text-center mb-4">
          <h2 class="fw-bold text-primary">
            <i class="fas fa-tasks me-2"></i>TaskFlow
          </h2>
          <p class="text-muted">Créez votre compte gratuitement</p>
        </div>

        <div id="alert" class="alert d-none"></div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Nom complet</label>
          <input type="text" id="name" class="form-control form-control-lg"
                 placeholder="Votre nom complet">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" id="email" class="form-control form-control-lg"
                 placeholder="votre@email.com">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Mot de passe</label>
          <input type="password" id="password" class="form-control form-control-lg"
                 placeholder="Minimum 6 caractères">
        </div>
        <button id="registerBtn" class="btn btn-primary btn-lg w-100 fw-bold">
          <i class="fas fa-user-plus me-2"></i>Créer mon compte
        </button>

        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          Déjà un compte ?
          <a href="login.html" class="text-primary fw-semibold">Se connecter</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('registerBtn');

      if (!name || !email || !password) {
        showAlert('alert', 'Veuillez remplir tous les champs', 'danger');
        return;
      }
      if (password.length < 6) {
        showAlert('alert', 'Le mot de passe doit avoir au moins 6 caractères', 'warning');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Création...';

      try {
        const res = await axios.post('/api/auth/register', { name, email, password });
        localStorage.setItem('token', res.data.token);
        localStorage.setItem('user', JSON.stringify(res.data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        const msg = err.response?.data?.message || 'Erreur lors de l\'inscription';
        showAlert('alert', msg, 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Créer mon compte';
      }
    });
  </script>
</body>
</html>
