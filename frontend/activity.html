<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #0d0d1a; color: #e0e0ff; font-family: 'Segoe UI', sans-serif; }
    .navbar-brand span { color: #7c6aff; }

    .card { background: #13132a; border: 1px solid #2a2a4a; border-radius: 14px; }
    .card-header { background: #1a1a35; border-bottom: 1px solid #2a2a4a; border-radius: 14px 14px 0 0 !important; }

    .timeline { position: relative; padding-left: 20px; }
    .timeline::before {
      content: ''; position: absolute; left: 19px; top: 0; bottom: 0;
      width: 2px; background: linear-gradient(to bottom, #7c6aff44, #7c6aff11);
    }

    .timeline-item { position: relative; padding: 0 0 24px 52px; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .timeline-icon {
      position: absolute; left: 0;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border: 2px solid;
    }

    .icon-task_created       { background:#4ade8015; border-color:#4ade8055; color:#4ade80; }
    .icon-task_deleted       { background:#f8717115; border-color:#f8717155; color:#f87171; }
    .icon-task_status_changed{ background:#60a5fa15; border-color:#60a5fa55; color:#60a5fa; }
    .icon-member_added       { background:#a78bfa15; border-color:#a78bfa55; color:#a78bfa; }
    .icon-member_removed     { background:#fb923c15; border-color:#fb923c55; color:#fb923c; }
    .icon-project_updated    { background:#facc1515; border-color:#facc1555; color:#facc15; }

    .timeline-body {
      background: #1a1a35; border: 1px solid #2a2a4a;
      border-radius: 10px; padding: 12px 16px; transition: border-color 0.2s;
    }
    .timeline-body:hover { border-color: #7c6aff55; }
    .timeline-msg { font-size: 14px; color: #c7c7f0; margin-bottom: 6px; }
    .timeline-msg strong { color: #a78bfa; }
    .timeline-time { font-size: 11px; color: #5a5a7a; font-family: monospace; }

    .badge-type { font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 600; }

    .stat-card {
      background: #1a1a35; border: 1px solid #2a2a4a; border-radius: 12px;
      padding: 16px; text-align: center; transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: #7c6aff; }
    .stat-number { font-size: 26px; font-weight: 800; }
    .stat-label { font-size: 11px; color: #5a5a7a; font-family: monospace; }

    .page-link { background: #1a1a35; border-color: #2a2a4a; color: #7c6aff; }
    .page-link:hover, .page-item.active .page-link { background: #7c6aff; border-color: #7c6aff; color: #fff; }
    .spinner-border { color: #7c6aff; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark px-4 py-3 mb-4" style="background:#0a0a18; border-bottom:1px solid #2a2a4a;">
    <a class="navbar-brand fw-bold" href="#">
      <i class="fa-solid fa-diagram-project me-2" style="color:#7c6aff"></i>Task<span>Flow</span>
    </a>
    <a href="#" style="color:#5a5a7a; font-size:13px; text-decoration:none;">
      <i class="fa-solid fa-arrow-left me-1"></i> Retour au projet
    </a>
  </nav>

  <div class="container pb-5" style="max-width:760px;">

    <div class="mb-4">
      <h2 class="fw-bold mb-1">
        <i class="fa-solid fa-clock-rotate-left me-2" style="color:#7c6aff"></i>Fil d'activité
      </h2>
      <p id="project-label" style="color:#5a5a7a; font-size:13px; font-family:monospace;">Chargement...</p>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-number" style="color:#7c6aff" id="s-total">—</div>
          <div class="stat-label">total</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-number" style="color:#4ade80" id="s-created">—</div>
          <div class="stat-label">créées</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-number" style="color:#60a5fa" id="s-status">—</div>
          <div class="stat-label">statuts</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-number" style="color:#a78bfa" id="s-members">—</div>
          <div class="stat-label">membres</div>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center py-3 px-4">
        <span class="fw-bold" style="font-size:15px;">
          <i class="fa-solid fa-timeline me-2" style="color:#7c6aff"></i>Activités récentes
        </span>
        <button class="btn btn-sm" style="background:#0d0d1a; border:1px solid #2a2a4a; color:#7c6aff; font-size:12px;" onclick="loadActivities(1)">
          <i class="fa-solid fa-rotate me-1"></i>Actualiser
        </button>
      </div>
      <div class="card-body p-4">
        <div id="activity-list">
          <div class="text-center py-5">
            <div class="spinner-border mb-3" role="status"></div>
            <p style="color:#5a5a7a; font-size:13px;">Chargement...</p>
          </div>
        </div>
        <nav id="pag-wrap" class="mt-3" style="display:none;">
          <ul class="pagination justify-content-center mb-0" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    let currentPage = 1, totalPages = 1;

    const TYPES = {
      task_created:        { icon:'fa-plus',       cls:'icon-task_created',        label:'tâche créée',      color:'#4ade80' },
      task_deleted:        { icon:'fa-trash',       cls:'icon-task_deleted',        label:'tâche supprimée',  color:'#f87171' },
      task_status_changed: { icon:'fa-rotate',      cls:'icon-task_status_changed', label:'statut modifié',   color:'#60a5fa' },
      member_added:        { icon:'fa-user-plus',   cls:'icon-member_added',        label:'membre ajouté',    color:'#a78bfa' },
      member_removed:      { icon:'fa-user-minus',  cls:'icon-member_removed',      label:'membre retiré',    color:'#fb923c' },
      project_updated:     { icon:'fa-pen',         cls:'icon-project_updated',     label:'projet modifié',   color:'#facc15' },
    };

    function timeAgo(d) {
      const s = Math.floor((Date.now() - new Date(d)) / 1000);
      if (s < 60) return "à l'instant";
      if (s < 3600) return `il y a ${Math.floor(s/60)} min`;
      if (s < 86400) return `il y a ${Math.floor(s/3600)} h`;
      return `il y a ${Math.floor(s/86400)} j`;
    }

    function label(a) {
      const u = `<strong>${a.user?.name||"Quelqu'un"}</strong>`;
      switch(a.type) {
        case 'task_created':        return `${u} a créé la tâche « ${a.meta?.taskTitle} »`;
        case 'task_deleted':        return `${u} a supprimé « ${a.meta?.taskTitle} »`;
        case 'task_status_changed': return `${u} : « ${a.meta?.taskTitle} » <strong>${a.meta?.from}</strong> → <strong>${a.meta?.to}</strong>`;
        case 'member_added':        return `${u} a ajouté <strong>${a.meta?.memberName}</strong>`;
        case 'member_removed':      return `${u} a retiré <strong>${a.meta?.memberName}</strong>`;
        case 'project_updated':     return `${u} a modifié le projet`;
        default: return 'Action inconnue';
      }
    }

    function renderActivities(data) {
      document.getElementById('s-total').textContent   = data.length;
      document.getElementById('s-created').textContent = data.filter(a=>a.type==='task_created').length;
      document.getElementById('s-status').textContent  = data.filter(a=>a.type==='task_status_changed').length;
      document.getElementById('s-members').textContent = data.filter(a=>a.type==='member_added').length;

      const list = document.getElementById('activity-list');
      if (!data.length) {
        list.innerHTML = `<div class="text-center py-5" style="color:#5a5a7a">
          <i class="fa-solid fa-inbox fa-2x mb-3 d-block"></i>Aucune activité</div>`;
        return;
      }
      list.innerHTML = `<div class="timeline">` + data.map((a,i) => {
        const t = TYPES[a.type] || { icon:'fa-circle', cls:'', label:a.type, color:'#888' };
        return `<div class="timeline-item" style="animation-delay:${i*0.06}s">
          <div class="timeline-icon ${t.cls}"><i class="fa-solid ${t.icon}"></i></div>
          <div class="timeline-body">
            <p class="timeline-msg">${label(a)}</p>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="timeline-time"><i class="fa-regular fa-clock me-1"></i>${timeAgo(a.createdAt)}</span>
              <span class="badge-type" style="background:${t.color}22;color:${t.color}">${t.label}</span>
            </div>
          </div>
        </div>`;
      }).join('') + `</div>`;
    }

    function renderPagination() {
      const wrap = document.getElementById('pag-wrap');
      if (totalPages <= 1) { wrap.style.display='none'; return; }
      wrap.style.display = 'block';
      document.getElementById('pagination').innerHTML = `
        <li class="page-item ${currentPage===1?'disabled':''}">
          <a class="page-link" href="#" onclick="loadActivities(${currentPage-1})"><i class="fa-solid fa-chevron-left"></i></a>
        </li>
        <li class="page-item active"><span class="page-link">${currentPage} / ${totalPages}</span></li>
        <li class="page-item ${currentPage===totalPages?'disabled':''}">
          <a class="page-link" href="#" onclick="loadActivities(${currentPage+1})"><i class="fa-solid fa-chevron-right"></i></a>
        </li>`;
    }

    async function loadActivities(page=1) {
      const token = localStorage.getItem('token');
      const pid   = localStorage.getItem('currentProjectId') || 'PROJECT_ID';
      document.getElementById('activity-list').innerHTML = `
        <div class="text-center py-5"><div class="spinner-border mb-3" role="status"></div>
        <p style="color:#5a5a7a;font-size:13px">Chargement...</p></div>`;
      try {
        const res = await axios.get(
          `http://localhost:3000/api/projects/${pid}/activities?page=${page}&limit=10`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        currentPage = res.data.page;
        totalPages  = res.data.totalPages;
        document.getElementById('project-label').textContent = `${res.data.total} événements enregistrés`;
        renderActivities(res.data.data);
        renderPagination();
      } catch(err) {
        document.getElementById('activity-list').innerHTML = `
          <div class="text-center py-5" style="color:#f87171">
            <i class="fa-solid fa-triangle-exclamation fa-2x mb-3 d-block"></i>Erreur : ${err.message}</div>`;
      }
    }

    loadActivities();
  </script>
</body>
</html>
