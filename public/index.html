<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestion des Tâches</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 20px; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: auto; }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #218838; }
        .task-list { margin-top: 20px; }
        .task-item { background: #f8f9fa; padding: 10px; border-left: 5px solid #007bff; margin-bottom: 10px; border-radius: 4px; }
        .task-item h3 { margin: 0 0 5px 0; color: #007bff; }
        .task-item p { margin: 0; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>TaskFlow 🚀</h1>
    
    <div class="form-group">
        <label for="taskTitle">Titre de la tâche :</label>
        <input type="text" id="taskTitle" placeholder="Ex: Finir le projet JS">
    </div>
    <div class="form-group">
        <label for="taskDesc">Description :</label>
        <textarea id="taskDesc" rows="3" placeholder="Ex: Ajouter le frontend et tester les routes"></textarea>
    </div>
    <button id="addBtn">Ajouter la tâche</button>

    <h2>Mes Tâches :</h2>
    <div id="taskList" class="task-list">
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
